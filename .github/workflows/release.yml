name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create ${{ github.ref_name }} --draft --generate-notes

  build-linux:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: x86_64
          - runner: ubuntu-24.04-arm
            arch: aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - name: Build static binary
        run: |
          docker run --rm -v $PWD:/src -w /src crystallang/crystal:latest-alpine \
            sh -c "shards install --production && shards build ark --static --release && strip bin/ark"
      - name: Package
        run: |
          VERSION=${{ github.ref_name }}
          ARCHIVE=ark-${VERSION}-${{ matrix.arch }}-linux-musl.tar.gz
          tar czf ${ARCHIVE} -C bin ark
          echo "ARCHIVE=${ARCHIVE}" >> $GITHUB_ENV
      - name: Upload
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.ref_name }} ${{ env.ARCHIVE }}

  build-macos:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            arch: aarch64
          - runner: macos-13
            arch: x86_64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: crystal-lang/install-crystal@v1
      - name: Build binary
        run: shards install --production && shards build ark --release
      - name: Package
        run: |
          VERSION=${{ github.ref_name }}
          ARCHIVE=ark-${VERSION}-${{ matrix.arch }}-darwin.tar.gz
          tar czf ${ARCHIVE} -C bin ark
          echo "ARCHIVE=${ARCHIVE}" >> $GITHUB_ENV
      - name: Upload
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.ref_name }} ${{ env.ARCHIVE }}

  docker:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/crystal-autobot/ark:latest
            ghcr.io/crystal-autobot/ark:${{ github.ref_name }}
